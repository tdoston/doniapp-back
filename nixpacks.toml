[variables]
PYTHONUNBUFFERED = "1"

[phases.setup]
nixPkgs = ["python311", "postgresql"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "bash -c 'if [ -z \"$DATABASE_URL\" ]; then echo \"ERROR: DATABASE_URL not set — link a Postgres service to this Railway service.\"; exit 1; fi'",
  "psql \"$DATABASE_URL\" -v ON_ERROR_STOP=1 -f sql/postgres_bootstrap.sql",
  "python manage.py migrate --noinput",
  "python manage.py seed_defaults",
]

[start]
cmd = "bash -lc \"set -e; python manage.py bootstrap_postgres_schema && python manage.py migrate --noinput && python manage.py seed_defaults && exec gunicorn swiftbookings.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2 --threads 4 --timeout 120\""
