[variables]
PYTHONUNBUFFERED = "1"

[phases.setup]
# postgresql: `psql` client (bootstrap SQL uchun)
nixPkgs = ["python311", "postgresql"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
# 1) Biznes jadvallar (managed=False) — bo'sh DB uchun bir marta ham, keyingi deploylarda IF NOT EXISTS
# 2) Django migratsiyalari
# 3) Xonalar / filiallar seed (idempotent — har deployda xavfsiz)
cmds = [
  "bash -c 'if [ -z \"$DATABASE_URL\" ]; then echo \"DATABASE_URL required: link Postgres plugin to this service\"; exit 1; fi'",
  "psql \"$DATABASE_URL\" -v ON_ERROR_STOP=1 -f sql/postgres_bootstrap.sql",
  "python manage.py migrate --noinput",
  "python manage.py seed_initial_db",
]

[start]
# Startda ham bootstrap+migrate: buildda DATABASE_URL bo'lmasa yoki eski image bo'lsa, jadvallar yo'qolmasin.
cmd = "bash -lc \"set -e; python manage.py bootstrap_postgres_schema && python manage.py migrate --noinput && python manage.py seed_initial_db && exec gunicorn swiftbookings.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2 --threads 4 --timeout 120\""
